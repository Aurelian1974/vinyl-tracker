<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <title>VinylTracker</title>
    <script>
      // GitHub Pages SPA fix: redirecționează 404 → index.html cu calea ca query param
      // https://github.com/rafgraph/spa-github-pages
      var segmentCount = 1; // numărul de segmente din base URL (/vinyl-tracker = 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
